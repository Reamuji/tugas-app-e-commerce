<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keranjang – Pasar Rifqi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #3a5c1a;
      --green-mid: #5b8c2a;
      --green-light: #dfeef5;
      --yellow: #f7c600;
      --yellow-light: #fff4d8;
      --yellow-pale: #ffe9a8;
      --white: #ffffff;
      --gray-light: #f7f7f7;
      --gray-border: #eee;
      --gray-text: #555;
      --dark: #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-light);
      color: var(--dark);
    }

    a { text-decoration: none; color: inherit; }

    .container { max-width: 1200px; margin: auto; padding: 0 20px; }

    /* ── NAVBAR ── */
    .navbar-wrap {
      background: #fff;
      border-bottom: 1px solid var(--gray-border);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      color: var(--green-dark);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--green-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .nav-icons { display: flex; gap: 18px; }
    .nav-icons a {
      font-size: 18px; color: var(--dark);
      transition: color .2s; position: relative;
    }
    .nav-icons a:hover { color: var(--green-mid); }
    .cart-badge {
      position: absolute; top: -6px; right: -8px;
      background: var(--yellow); color: var(--dark);
      font-size: 10px; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      padding: 14px 0;
      font-size: 13px;
      color: var(--gray-text);
    }
    .breadcrumb span { color: var(--green-mid); }

    /* ── CHECKOUT STEPS ── */
    .steps-wrap { text-align: center; margin: 10px 0 30px; }
    .steps {
      display: inline-flex; align-items: center; gap: 0;
      font-size: 14px;
    }
    .step {
      display: flex; align-items: center; gap: 8px;
      font-weight: 500; color: var(--gray-text);
    }
    .step.active { color: var(--green-dark); font-weight: 600; }
    .step-line {
      width: 60px; height: 2px;
      background: var(--gray-border);
      margin: 0 12px;
    }

    /* ── PAGE TITLE ── */
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700;
      margin-bottom: 10px;
    }
    .title-divider {
      border: none; border-top: 1px solid var(--gray-border);
      margin-bottom: 24px;
    }

    /* ── LAYOUT ── */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* ── CART CARD ── */
    .cart-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
    }
    .cart-card-title {
      font-size: 15px; font-weight: 600;
      margin-bottom: 20px; color: var(--dark);
    }

    /* ── CART ITEM ── */
    .cart-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--gray-border);
    }
    .cart-item:last-child { border-bottom: none; }
    .item-img {
      width: 90px; height: 90px;
      border-radius: 8px; object-fit: cover;
      background: var(--yellow-pale);
    }
    .item-info { display: flex; flex-direction: column; gap: 4px; }
    .item-name { font-size: 15px; font-weight: 600; }
    .item-category { font-size: 12px; color: var(--gray-text); }
    .item-variant { font-size: 12px; color: var(--gray-text); }
    .item-price-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .item-price-old { font-size: 13px; color: #bbb; text-decoration: line-through; }
    .item-price { font-size: 16px; font-weight: 700; color: var(--dark); }
    .item-discount { font-size: 12px; font-weight: 700; color: #e05c00; }

    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    .qty-control {
      display: flex; align-items: center;
      border: 1.5px solid var(--gray-border);
      border-radius: 6px; overflow: hidden;
    }
    .qty-btn {
      width: 34px; height: 34px;
      background: var(--dark); color: #fff;
      border: none; font-size: 16px;
      cursor: pointer; transition: background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: var(--green-mid); }
    .qty-num {
      width: 40px; text-align: center;
      font-size: 14px; font-weight: 600;
      border: none; outline: none;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
    }
    .remove-btn {
      font-size: 12px; color: var(--gray-text);
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      transition: color .2s;
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .remove-btn:hover { color: #e74c3c; }

    /* ── RIGHT PANEL ── */
    .right-panel { display: flex; flex-direction: column; gap: 16px; }

    .panel-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
    }
    .panel-title {
      font-size: 16px; font-weight: 600;
      margin-bottom: 16px; color: var(--dark);
    }

    /* Coupon */
    .coupon-row { display: flex; gap: 0; }
    .coupon-input {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid var(--gray-border);
      border-right: none;
      border-radius: 6px 0 0 6px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      outline: none;
    }
    .coupon-input:focus { border-color: var(--green-mid); }
    .coupon-btn {
      padding: 11px 18px;
      background: var(--dark); color: #fff;
      border: none; border-radius: 0 6px 6px 0;
      font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      letter-spacing: .5px;
      transition: background .2s;
    }
    .coupon-btn:hover { background: var(--green-dark); }

    /* Order Summary */
    .order-row {
      display: flex; justify-content: space-between;
      font-size: 14px; padding: 8px 0;
      border-bottom: 1px solid var(--gray-border);
    }
    .order-row:last-of-type { border-bottom: none; }
    .order-row.total {
      font-size: 16px; font-weight: 700;
      border-top: 2px solid var(--gray-border);
      border-bottom: none;
      margin-top: 4px; padding-top: 14px;
    }

    /* Delivery */
    .delivery-section { margin: 12px 0; }
    .delivery-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .delivery-option {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; padding: 4px 0; cursor: pointer;
    }
    .delivery-option input[type=checkbox] {
      accent-color: var(--green-mid);
      width: 16px; height: 16px;
    }

    /* Tip */
    .tip-section { margin: 12px 0; }
    .tip-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .tip-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .tip-opt {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; cursor: pointer;
    }
    .tip-opt input[type=checkbox] { accent-color: var(--green-mid); width: 15px; height: 15px; }
    .tip-custom {
      display: flex; align-items: center; gap: 8px; font-size: 13px;
    }
    .tip-custom input[type=text] {
      width: 50px; padding: 6px 8px;
      border: 1px solid var(--gray-border); border-radius: 4px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; text-align: center;
    }

    /* Credits */
    .credits-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; padding: 8px 0;
    }
    .credits-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .credits-row input[type=checkbox] { accent-color: var(--green-mid); width: 15px; height: 15px; }

    /* Checkout btn */
    .checkout-btn {
      width: 100%; padding: 16px;
      background: var(--yellow);
      color: var(--dark);
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: .5px;
      font-family: 'DM Sans', sans-serif;
      transition: opacity .2s;
      margin-top: 4px;
    }
    .checkout-btn:hover { opacity: .88; }

    /* ── FEATURES ── */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 40px 0;
    }
    .feature-card {
      background: #fff; border-radius: 10px;
      padding: 24px; display: flex; gap: 16px; align-items: flex-start;
    }
    .feature-icon {
      font-size: 28px; flex-shrink: 0;
      width: 48px; height: 48px;
      background: var(--yellow-pale); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .feature-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .feature-text { font-size: 12px; color: var(--gray-text); line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      background: var(--green-dark);
      color: rgba(255,255,255,0.75);
      padding: 50px 0 28px;
      margin-top: 10px;
    }
    .footer-top {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1.5fr;
      gap: 40px;
      margin-bottom: 40px;
    }
    .footer-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: #fff;
      margin-bottom: 12px;
    }
    .footer-desc { font-size: 13px; line-height: 1.7; }
    .footer-col-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 14px; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .footer-col ul li a { font-size: 13px; transition: color .2s; }
    .footer-col ul li a:hover { color: var(--yellow); }
    .subscribe-label { font-size: 13px; margin-bottom: 10px; }
    .subscribe-row { display: flex; gap: 0; }
    .subscribe-input {
      flex: 1; padding: 11px 14px;
      border: none; border-radius: 6px 0 0 6px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
    }
    .subscribe-btn {
      padding: 11px 14px;
      background: var(--yellow); color: var(--dark);
      border: none; border-radius: 0 6px 6px 0;
      font-size: 18px; cursor: pointer; transition: opacity .2s;
    }
    .subscribe-btn:hover { opacity: .85; }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px;
      text-align: center;
      font-size: 12px;
    }
    footer span { color: var(--yellow); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar-wrap">
  <div class="container navbar">
    <div class="logo">
      <div class="logo-icon">🍀</div>
      Pasar Rifqi
    </div>
    <div class="nav-icons">
      <a href="#">
        🛒
        <span class="cart-badge">4</span>
      </a>
      <a href="#">👤</a>
    </div>
  </div>
</div>


<div style="display: flex; justify-content: center;">
  <canvas width="100" height="100" id="canvas"></canvas>
</div>

    <div class="footer-bottom">
      © 2026 <span>Pasar Rifqi</span>. All Rights Reserved.
    </div>
  </div>
</footer>

<script src="lib/qrcode.min.js"></script>

<script>

const CRC16 = (str)=>{
  let crc = 0xFFFF;
  for (let i = 0; i< str.length;i++){
      crc ^= str.charCodeAt(i) << 8;
      for (let j = 0; j<8; j++){
          if(crc& 0x8000){
              crc = (crc << 1) ^ 0x1021;
          }else{
              crc = crc << 1;
          }
      }
  }
  return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
};

const generateDynamicQRISPayload = (amount) => {
  const staticQRISPayload ='00020101021126610014COM.GO-JEK.WWW01189360091432867767240210G2867767240303UMI51440014ID.CO.QRIS.WWW0215ID10265142736420303UMI5204549953033605802ID5911Pasar Rifqi6007BANDUNG61054013362070703A016304FF53'
  const qrisWithoutCRC = staticQRISPayload.substring(0,staticQRISPayload.length - 4);
  
  const dynamicQris = qrisWithoutCRC.replace("010211","010212");

  const parts = dynamicQris.split("5802ID");
  if(parts.length!=2){
      throw new Error("Qrisnya gk palid");
  }

  const amountStr = String(parseInt(amount));
  const lengthStr = String(amountStr.length).padStart(2,"0");
  const amountTag = "54" + lengthStr + amountStr;

  const payload = parts[0] + amountTag + "5802ID" + parts[1];

  const newCRC = CRC16(payload);
  
  let canvas = document.getElementById("canvas")  

  const newQRIS = payload + newCRC

  QRCode.toCanvas(canvas, newQRIS, (err) => {
      if(err) console.error(err)
  })
}
generateDynamicQRISPayload(1000)

</script>
<script>
  function rupiah(num){
    return "Rp." + Math.ceil(num).toLocaleString("id-ID")
}

</script>
</body>
</html>
